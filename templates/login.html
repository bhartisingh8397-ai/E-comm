<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jahnvi Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-container">
    <div class="logo" style="position: absolute; top: 2rem; left: 5%; color: #121212;">
        <div class="logo-icon">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Jahnvi Logo">
        </div>
        Jahnvi
    </div>
    <div class="auth-card glass reveal">
        <h2 style="margin-bottom: 2rem; text-align: center; color: var(--text-primary);">Welcome Back</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-message flash-error">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="name@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent); text-decoration: none;">Create one</a>
        </p>
    </div>
</body>
</html>
